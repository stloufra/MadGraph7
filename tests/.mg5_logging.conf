[formatters]
keys: cmdprint,simple,madgraph,tutorial

[handlers]
keys: cmdprint,root,madgraph,fatalerror,tutorial,tutorial_aMCatNLO,tutorial_MadLoop

[loggers]
keys: root,cmd,madgraph,fatalerror,tutorial,tutorial_aMCatNLO,tutorial_MadLoop,tutorial_plugin


[formatter_cmdprint]
class: logging.ColorFormatter
format: $COLOR%(message)s$RESET

[formatter_simple]
class: logging.ColorFormatter
format: %(name)s: %(message)s

[formatter_madgraph]
class: logging.ColorFormatter
format: $COLOR%(levelname)s: %(message)s $RESET

[formatter_tutorial]
class: logging.ColorFormatter
format:  $_BOLD========== Tutorial ==========$_RESET$BR$COLOR%(message)s $RESET$BR$_BOLD========== Tutorial ==========$_RESET


[handler_cmdprint]
class: StreamHandler
args: [sys.stdout]
formatter: cmdprint

[handler_root]
class: StreamHandler
args: [sys.stdout]
formatter: simple

[handler_madgraph]
class: StreamHandler
args: [sys.stdout]
formatter: madgraph

[handler_fatalerror]
class: StreamHandler
args: [sys.stderr]
formatter: cmdprint

[handler_tutorial]
class: StreamHandler
args: [sys.stdout]
formatter: tutorial

[handler_tutorial_aMCatNLO]
class: StreamHandler
args: [sys.stdout]
formatter: simple

[handler_tutorial_MadLoop]
class: StreamHandler
args: [sys.stdout]
formatter: simple


[logger_root]
# level overwritten by test_manager
level: CRITICAL
handlers: root

[logger_madgraph]
# level overwritten by test_manager
level: CRITICAL
handlers: madgraph
qualname=madgraph
propagate=0

[logger_cmd]
# level overwritten by test_manager
level: CRITICAL 
handlers: cmdprint
qualname=cmdprint
propagate=0


[logger_fatalerror]
level: CRITICAL
handlers: fatalerror
qualname=fatalerror
propagate=0

[logger_tutorial]
level : ERROR
handlers: tutorial
qualname=tutorial
propagate=0

[logger_tutorial_plugin]
level : ERROR
handlers: tutorial
qualname=tutorial_plugin
propagate=0

[logger_tutorial_MadLoop]
level : ERROR
handlers: tutorial_MadLoop
qualname=tutorial_MadLoop
propagate=0

[logger_tutorial_aMCatNLO]
level : ERROR
handlers: tutorial_aMCatNLO
qualname=tutorial_aMCatNLO
propagate=0

