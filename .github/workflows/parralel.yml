# This is a basic workflow to help you get started with Actions

name: running parralel test
# Controls when the workflow will run
#    branches: [ main LTS ]
on:
  # Triggers the workflow on push or pull request events but only for the 3.4.0 branch
  push:
    paths-ignore:
      - 'docs/**'
#      - '.github/**'

  pull_request:
    types: [opened, synchronize, reopened]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      message:
        description: 'running parralel test'     
        required: true

env:
  commitmsg: ${{ github.event.head_commit.message }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"


  test_short_cross_sqso1:
    # The type of runner that the job will run on
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' || github.event.pull_request.head.repo.fork == true

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v5
      - name: Reset MG5 config
        run: cp input/.mg5_configuration_default.txt input/mg5_configuration.txt
      - uses: ./.github/actions/restore-pip-cache

      # Runs a set of commands using the runners shell
      - name: test test_short_cross_sqso1
        run: |
            cd $GITHUB_WORKSPACE
            cp Template/LO/Source/.make_opts Template/LO/Source/make_opts
            ./tests/test_manager.py test_short_cross_sqso1 -pP -t0 -l INFO



