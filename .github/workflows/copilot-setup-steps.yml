name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    steps:
      - name: Restore UFO model cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/UFOMODEL
          key: ufomodel
          fail-on-cache-miss: false

      - name: Set PYTHONPATH for UFO models
        run: echo "PYTHONPATH=$PYTHONPATH:$HOME/.cache/UFOMODEL" >> $GITHUB_ENV
