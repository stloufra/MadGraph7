  contur_cache:
     runs-on: ${{ matrix.os }}
     needs: pythia8_cache
     strategy:
       matrix:
         os: [ubuntu-22.04, ubuntu-24.04]

     # Steps represent a sequence of tasks that will be executed as part of the job
     steps:
       - name: Set cache key
         run: echo "CACHE_KEY=$ImageOS" >> $GITHUB_ENV
       - name: check Cache rivet/contur packages
         id: cache-contur
         uses: actions/cache@v5
         with:
           path: ~/.cache/HEPtools
           key: contur-${{ env.CACHE_KEY }}

       - name: get mg5
         if: steps.cache-contur.outputs.cache-hit != 'true'
         uses: actions/checkout@v5
       
       - name: restore previous cache (pythia8)  
         if: steps.cache-contur.outputs.cache-hit != 'true'
         uses: ./.github/actions/restore_heptools_pythia8

       - name: Install contur into cache dir 
         if: steps.cache-contur.outputs.cache-hit != 'true'
         run: |
               mkdir -p /home/runner/.cache/HEPtools
               cd $GITHUB_WORKSPACE
               echo "heptools_install_dir=/home/runner/.cache/HEPtools" >> input/mg5_configuration.txt
               cp Template/LO/Source/.make_opts Template/LO/Source/make_opts
               echo "install rivet" > cmd
               echo "install contur" >> cmd
               ./bin/mg5_aMC cmd

       #- name: Delete pythia8 cache (include in contur cache)
       #  run: |
       #      gh cache delete pythia8-${{ env.CACHE_KEY }} --repo $GITHUB_REPOSITORY || true
       #  env:
       #     GH_TOKEN: ${{ github.token }}

  looptools_cache:
     runs-on: ${{ matrix.os }}
     strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
     needs:
       - delete-cache

     # Steps represent a sequence of tasks that will be executed as part of the job
     steps:
       - name: Set cache key
         run: echo "CACHE_KEY=$ImageOS" >> $GITHUB_ENV
       - name: Cache loop packages (iregi/cutools)
         id: cache-nlo
         uses: actions/cache@v5
         with:
           path: ~/.cache/HEPtools
           key: looptools-${{ env.CACHE_KEY }} # key to change if not final step
       
       - name: get mg5
         if: steps.cache-nlo.outputs.cache-hit != 'true'
         uses: actions/checkout@v5

       - name: Install cuttools/iregi into cache dir
         if: steps.cache-nlo.outputs.cache-hit != 'true'
         run: |
               mkdir -p /home/runner/.cache/HEPtools/CutTools/lib
               mkdir -p /home/runner/.cache/HEPtools/IREGI/src
               cd $GITHUB_WORKSPACE
               echo "heptools_install_dir=/home/runner/.cache/HEPtools" >> input/mg5_configuration.txt
               cp Template/LO/Source/.make_opts Template/LO/Source/make_opts
               cd vendor/IREGI/src
               make
               cd ../../CutTools
               make
               cd ../../
               cp -r vendor/IREGI/src/libiregi.a /home/runner/.cache/HEPtools/IREGI/src/
               cp -r vendor/./CutTools/includects/libcts.a /home/runner/.cache/HEPtools/CutTools/lib
               cp -r vendor/./CutTools/includects/mpmodule.mod /home/runner/.cache/HEPtools/CutTools/lib

       - name: Install ninja/collier into cache dir 
         if: steps.cache-nlo.outputs.cache-hit != 'true'
         run: |
               mkdir -p ~/.cache/HEPtools
               cd $GITHUB_WORKSPACE
               echo "heptools_install_dir=/home/runner/.cache/HEPtools" >> input/mg5_configuration.txt
               cp Template/LO/Source/.make_opts Template/LO/Source/make_opts
               echo "install collier " > cmd
               echo "install ninja " >> cmd
               ./bin/mg5_aMC cmd

  heptools_cache:
    runs-on: ${{ matrix.os }}       
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    needs: [lhapdf_cache, pythia8_cache, emela_cache, looptools_cache, contur_cache]
    if: always()   # 👈 runs even if a dependency failed
    steps:
      - name: Set cache key
        run: echo "CACHE_KEY=$ImageOS" >> $GITHUB_ENV

      - name: Restore pythia8 (if available)
        if: needs.pythia8_cache.result == 'success'
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/HEPtools
          key: pythia8-${{ env.CACHE_KEY }}

      - name: Restore emela (if available)
        if: needs.emela_cache.result == 'success'
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/HEPtools
          key: emela-${{ env.CACHE_KEY }}

      - name: Restore lhapdf (fallback when pythia8 and emela failed)
        if: needs.lhapdf_cache.result == 'success' && (needs.pythia8_cache.result != 'success' || needs.emela_cache.result != 'success')
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/HEPtools
          key: lhapdf-${{ env.CACHE_KEY }}
      - name: Restore contur (if available)
        if: needs.contur_cache.result == 'success'
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/HEPtools
          key: contur-${{ env.CACHE_KEY }}

      - name: Restore looptools (if available)
        if: needs.looptools_cache.result == 'success'
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/HEPtools
          key: looptools-${{ env.CACHE_KEY }}

      - uses: actions/cache/save@v5
        with:
          path: ~/.cache/HEPtools
          key: heptools-${{ env.CACHE_KEY }}

      #- name: Cleanup intermediate caches (only if all succeeded)
      #  if: needs.pythia8_cache.result == 'success' && needs.emela_cache.result == 'success' && needs.contur_cache.result == 'success' && needs.looptools_cache.result == 'success'
