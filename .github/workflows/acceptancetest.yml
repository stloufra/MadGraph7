# This is a basic workflow to help you get started with Actions

name: running acceptance test (rest)
# Controls when the workflow will run
#    branches: [ main LTS ]
on:
  # Triggers the workflow on push or pull request events but only for the 3.4.0 branch
  push:
    paths-ignore:
      - 'docs/**'
#      - '.github/**'

  pull_request:
    types: [opened, synchronize, reopened]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      message:
        description: 'running acceptance test'
        required: true

env:
  commitmsg: ${{ github.event.head_commit.message }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  acceptancetest_5:
    # The type of runner that the job will run on
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' || github.event.pull_request.head.repo.fork == true
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      - uses: ./.github/actions/checkout_mg5
      - uses: ./.github/actions/restore-pip-cache
      - uses: ./.github/actions/restore_ufomodel
      # Runs a set of commands using the runners shell
      - name: test one of the test test_config
        run: |
            cd $GITHUB_WORKSPACE
            ./tests/test_manager.py test_config -pA -t0 -l INFO
            ./tests/test_manager.py test_draw -pA -t0 -l INFO
            ./tests/test_manager.py test_generate -pA -t0 -l INFO
            ./tests/test_manager.py test_import_model -pA -t0 -l INFO
